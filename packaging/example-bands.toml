# rusty-wire — custom band preset file
#
# Place this file at one of the following locations so rusty-wire picks it
# up automatically (no --bands-config flag needed):
#
#   ~/.config/rusty-wire/bands.toml   ← recommended (XDG-style config dir)
#   ./bands.toml                      ← current working directory fallback
#
# You can also point directly to any file with --bands-config <path>.
#
# ─── Custom bands ([[band]] entries) ──────────────────────────────────────────
#
# Define your own frequency entries that will be appended to every calculation
# run.  Each [[band]] entry requires:
#
#   name          – display label shown in results (e.g. "FT8-40m")
#   freq_low_mhz  – lower edge of the band in MHz
#   freq_high_mhz – upper edge of the band in MHz
#
# Optional:
#   freq_center_mhz – explicit centre frequency; defaults to the midpoint
#                     of freq_low_mhz and freq_high_mhz when omitted.
#
# Example:
#   [[band]]
#   name = "FT8-40m"
#   freq_low_mhz = 7.074
#   freq_high_mhz = 7.076
#
#   [[band]]
#   name = "WSPR-20m"
#   freq_low_mhz  = 14.0956
#   freq_high_mhz = 14.0956
#   freq_center_mhz = 14.0956
#
# ─── Band presets ([presets] table) ───────────────────────────────────────────
#
# A preset is a named list of band tokens under [presets].
# Band tokens are the same strings accepted by --bands (e.g. "40m", "20m",
# "80m-10m", "160m").  Tokens are comma-joined internally, so you may write
# them as separate list items for readability.
#
# Use --bands-preset <name> to activate a preset.
#
# Example presets
# ───────────────

[presets]

# Portable / SOTA operation — compact HF set
portable = ["40m", "20m", "17m", "15m", "10m"]

# DX-focused — full WARC bands included
portable-dx = ["40m", "30m", "20m", "17m", "15m", "12m", "10m"]

# Winter HF — low-band emphasis
winter = ["80m", "60m", "40m", "30m", "20m"]

# Digital modes (FT8 primary bands)
digital = ["40m", "30m", "20m", "17m", "15m", "10m"]

# All HF amateur bands (ITU Region 1 / Europe)
all-hf-r1 = ["160m", "80m", "60m", "40m", "30m", "20m", "17m", "15m", "12m", "10m"]

# North American contest standard (CQ WW / ARRL DX)
contest-na = ["80m", "40m", "20m", "15m", "10m"]

# EFHW multi-band — bands well-served by an end-fed half-wave at 40 m
efhw-40m = ["40m", "20m", "15m", "10m"]
