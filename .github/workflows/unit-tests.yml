name: Unit Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run unit tests
        run: cargo test --lib --verbose
      - name: Run integration tests
        run: cargo test --test '*' --verbose
      - name: Run all tests
        run: cargo test --all --verbose
