name: Release Packaging

on:
  push:
    tags:
      - 'v[0-9]*'

# All jobs need write access to upload release assets and open PRs.
permissions:
  contents: write
  pull-requests: write

jobs:
  # ── 0. Verify tag and version synchronization ───────────────────────────────
  verify-tag-version-sync:
    name: Verify tag/version sync
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract and verify tag version
        id: meta
        run: |
          TAG_VERSION=${GITHUB_REF_NAME#v}
          CARGO_VERSION=$(grep -E '^version\s*=\s*"' Cargo.toml | head -n1 | sed -E 's/^version\s*=\s*"([^"]+)"/\1/')
          if [[ "$TAG_VERSION" != "$CARGO_VERSION" ]]; then
            echo "Tag/Cargo version mismatch: tag=$TAG_VERSION Cargo.toml=$CARGO_VERSION" >&2
            exit 1
          fi
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify packaging metadata version sync
        run: scripts/check-packaging-version-sync.sh

  # ── 1. Create the GitHub Release (once, before uploading assets) ────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: verify-tag-version-sync
    outputs:
      version: ${{ needs.verify-tag-version-sync.outputs.version }}

    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "rusty-wire ${{ needs.verify-tag-version-sync.outputs.version }}"
          generate_release_notes: true

  # ── 1. Build the release binary for each target arch ────────────────────────
  release-binary:
    name: Build binary (${{ matrix.arch }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
            archive_suffix: x86_64-linux
          - arch: aarch64
            runner: ubuntu-24.04-arm   # native ARM64 runner (RPi 4/5 compatible)
            archive_suffix: aarch64-linux

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.arch }}-cargo-

      - name: Install pandoc
        run: sudo apt-get install -y pandoc

      - name: Build release binary
        run: cargo build --release --locked

      - name: Generate man page
        run: |
          mkdir -p target/man
          pandoc -s -t man docs/man/rusty-wire.1.md -o target/man/rusty-wire.1
          gzip -9 target/man/rusty-wire.1

      - name: Package binary tarball
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          BUNDLE_DIR="rusty-wire-${VERSION}-${{ matrix.archive_suffix }}"
          ARCHIVE="${BUNDLE_DIR}.tar.gz"
          mkdir -p "$BUNDLE_DIR"
          cp target/release/rusty-wire "$BUNDLE_DIR/"
          cp target/man/rusty-wire.1.gz "$BUNDLE_DIR/"
          tar czf "$ARCHIVE" "$BUNDLE_DIR"

      - name: Upload tarball to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: "rusty-wire-${{ needs.create-release.outputs.version }}-${{ matrix.archive_suffix }}.tar.gz"

  # ── 1a. Build and upload macOS bundles for tagged releases ─────────────────
  release-macos-bundle:
    name: Build macOS bundle (${{ matrix.arch }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: macos-13
            archive_suffix: x86_64-macos
          - arch: aarch64
            runner: macos-14
            archive_suffix: aarch64-macos

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.arch }}-cargo-

      - name: Install pandoc
        run: brew install pandoc

      - name: Build release binary
        run: cargo build --release --locked

      - name: Generate man page
        run: |
          mkdir -p target/man
          pandoc -s -t man docs/man/rusty-wire.1.md -o target/man/rusty-wire.1
          gzip -9 target/man/rusty-wire.1

      - name: Package macOS artifacts
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          BUNDLE_DIR="rusty-wire-${VERSION}-${{ matrix.archive_suffix }}"
          ARCHIVE="${BUNDLE_DIR}.tar.gz"
          PKG="${BUNDLE_DIR}.pkg"

          # tarball (for manual extraction, includes man page)
          mkdir -p "$BUNDLE_DIR"
          cp target/release/rusty-wire "$BUNDLE_DIR/"
          cp README.md LICENSE "$BUNDLE_DIR/"
          cp target/man/rusty-wire.1.gz "$BUNDLE_DIR/"
          tar czf "$ARCHIVE" "$BUNDLE_DIR"

          # .pkg installer (installs rusty-wire into /usr/local/bin + man page)
          mkdir -p pkg-root/usr/local/bin
          mkdir -p pkg-root/usr/local/share/man/man1
          cp target/release/rusty-wire pkg-root/usr/local/bin/
          cp target/man/rusty-wire.1.gz pkg-root/usr/local/share/man/man1/
          pkgbuild \
            --root pkg-root \
            --identifier io.github.dc0sk.rusty-wire \
            --version "$VERSION" \
            --install-location / \
            "$PKG"

      - name: Upload macOS artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            rusty-wire-${{ needs.create-release.outputs.version }}-${{ matrix.archive_suffix }}.tar.gz
            rusty-wire-${{ needs.create-release.outputs.version }}-${{ matrix.archive_suffix }}.pkg

  # ── 1b. Build and upload a Windows MSI installer ───────────────────────────
  release-windows-msi:
    name: Build Windows MSI installer
    needs: create-release
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: windows-x86_64-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: windows-x86_64-cargo-

      - name: Install pandoc
        run: choco install pandoc --no-progress -y

      - name: Build release binary
        run: cargo build --release --locked

      - name: Generate plain-text manual
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path target\man | Out-Null
          pandoc -s -t plain docs/man/rusty-wire.1.md -o target\man\rusty-wire.1.txt

      - name: Build Windows MSI
        shell: pwsh
        run: |
          $version    = "${{ needs.create-release.outputs.version }}"
          $binaryPath = "target\release\rusty-wire.exe"
          $manualPath = "target\man\rusty-wire.1.txt"
          $msiName    = "rusty-wire-${version}-x86_64-windows.msi"
          $wixBin     = "${env:WIX}bin"

          & "${wixBin}\candle.exe" `
            "-dVersion=${version}" `
            "-dBinaryPath=${binaryPath}" `
            "-dManualPath=${manualPath}" `
            packaging\windows\rusty-wire.wxs `
            -o rusty-wire.wixobj

          & "${wixBin}\light.exe" `
            rusty-wire.wixobj `
            -o "${msiName}"

      - name: Upload MSI to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: "rusty-wire-${{ needs.create-release.outputs.version }}-x86_64-windows.msi"

  # ── 2. Build and upload a Debian package for each target arch ───────────────
  release-deb:
    name: Build .deb (${{ matrix.arch }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm   # native ARM64 runner (RPi 4/5 compatible)

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-deb-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.arch }}-cargo-

      - name: Install pandoc and cargo-deb
        run: sudo apt-get install -y pandoc && cargo install cargo-deb --locked

      - name: Generate man page
        run: |
          mkdir -p target/man
          pandoc -s -t man docs/man/rusty-wire.1.md -o target/man/rusty-wire.1
          gzip -9 target/man/rusty-wire.1

      - name: Build .deb package
        run: cargo deb --locked

      - name: Upload .deb to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: target/debian/*.deb

  # ── 3. Update stable packaging metadata and open a PR ───────────────────────
  update-packaging-metadata:
    name: Update packaging metadata (Arch + Debian)
    runs-on: ubuntu-latest
    needs: create-release

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          # Use a PAT if you need to trigger branch-protection-required CI
          # on the resulting PR; GITHUB_TOKEN is sufficient otherwise.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute sha256 of upstream source tarball
        id: sha
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          TAG=${{ github.ref_name }}
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz"
          echo "Downloading $URL …"
          SHA256=$(curl -fsSL "$URL" | sha256sum | cut -d' ' -f1)
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"  >> "$GITHUB_OUTPUT"

      - name: Patch packaging files
        run: |
          VERSION=${{ steps.sha.outputs.version }}
          SHA256=${{ steps.sha.outputs.sha256 }}
          PKGBUILD=packaging/arch/rusty-wire/PKGBUILD
          DEBIAN_CHANGELOG=packaging/debian/changelog
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/"         "$PKGBUILD"
          sed -i "s/^pkgrel=.*/pkgrel=1/"                  "$PKGBUILD"
          sed -i "s/^sha256sums=.*/sha256sums=('${SHA256}')/" "$PKGBUILD"
          sed -Ei "1 s/^rusty-wire \([^)]+\)/rusty-wire (${VERSION}-1)/" "$DEBIAN_CHANGELOG"

      - name: Create branch and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.sha.outputs.version }}
          BRANCH="chore/packaging-metadata-update-v${VERSION}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add packaging/arch/rusty-wire/PKGBUILD packaging/debian/changelog
          git diff --staged --quiet && echo "Packaging metadata already up to date" && exit 0
          git commit -m "chore(packaging): sync Arch/Debian metadata to v${VERSION}"
          # Force-push so reruns replace a stale branch from a previous attempt.
          git push --force origin "$BRANCH"
          PR_BODY=$(printf '%s\n\n%s\n%s\n%s\n%s' \
            "Auto-generated by the \`release-packaging\` workflow after tag \`v${VERSION}\` was pushed." \
            "Updates:" \
            "- \`pkgver\` → \`${VERSION}\`" \
            "- \`pkgrel\` → \`1\`" \
            "- \`debian/changelog\` version → \`${VERSION}-1\`" \
            "- \`sha256sums\` → computed from the upstream release tarball")
          # Create the PR; if one already exists for this branch, report its URL instead.
          gh pr create \
            --title "chore(packaging): sync Arch/Debian metadata to v${VERSION}" \
            --body  "$PR_BODY" \
            --base  main \
            --head  "$BRANCH" \
          || gh pr view --head "$BRANCH" --json url --jq '"PR already exists: " + .url'